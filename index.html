<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Step 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <h1>Control Panel</h1>
        
        <div class="player-management">
            <h3>Player Settings</h3>
            <input type="text" id="batsmanName" placeholder="Batsman Name">
            <input type="file" id="batsmanImg" accept="image/*">
            <button onclick="updatePlayer('batsman')">Update Batsman</button>
            
            <br><br>
            
            <input type="text" id="bowlerName" placeholder="Bowler Name">
            <button onclick="updatePlayer('bowler')">Update Bowler</button>
        </div>

        <hr>

        <button onclick="toggleScoreboard()" class="extra">Show/Hide Scoreboard</button>
        
        <div class="score-controls" style="margin-top: 20px;">
            <button onclick="addRun(4)">4 Runs</button>
            <button onclick="addRun(6)">6 Runs</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
