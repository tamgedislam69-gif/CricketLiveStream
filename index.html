<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Professional Cricket Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* অ্যাডমিন প্যানেলের নিজস্ব স্কোরবোর্ড ডিজাইন */
        .admin-live-score { background: #001f3f; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 2px solid #ffcc00; }
        .admin-live-score h2 { margin: 0; font-size: 32px; }
        .admin-live-score p { margin: 5px 0 0; font-size: 18px; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>কন্ট্রোল প্যানেল (ধাপ ৩)</h1>

        <div class="admin-live-score">
            <h2 id="adminScoreText">0 - 0</h2>
            <p id="adminOverText">ওভার: 0.0</p>
        </div>

        <div class="format-selection">
            <label><b>খেলার ফরম্যাট:</b></label>
            <select id="matchFormat" onchange="changeFormat()">
                <option value="T20">টি-টোয়েন্টি (T20)</option>
                <option value="ODI">ওয়ানডে (ODI)</option>
                <option value="Test">টেস্ট (Test)</option>
            </select>
        </div>
        <hr>

        <div class="score-controls">
            <h3>রান যোগ করুন</h3>
            <div class="run-buttons">
                <button onclick="addRun(0)">০ (ডট)</button>
                <button onclick="addRun(1)">১ রান</button>
                <button onclick="addRun(2)">২ রান</button>
                <button onclick="addRun(3)">৩ রান</button>
                <button onclick="addRun(4)" class="boundary">৪ রান</button>
                <button onclick="addRun(6)" class="sixer">৬ রান</button>
            </div>
            
            <h3 style="margin-top: 15px;">উইকেট ও অতিরিক্ত রান</h3>
            <div class="action-buttons">
                <button class="danger" onclick="addWicket()">উইকেট (W)</button>
                <button class="extra" onclick="addExtra('Wide')">ওয়াইড (WD)</button>
                <button class="extra" onclick="addExtra('NoBall')">নো বল (NB)</button>
            </div>

            <hr>
            <button class="undo" onclick="undoLast()">↩️ Undo (শেষ বল মুছুন)</button>
            <button class="danger" onclick="resetMatch()" style="width: 100%; margin-top: 10px;">নতুন ম্যাচ শুরু করুন</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
