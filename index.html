<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <h1>Master Control Panel</h1>
        <button onclick="addRun(4)">4 Runs</button>
        <button onclick="addRun(6)">6 Runs</button>
        <button onclick="addWicket()">Wicket</button>
        
        <hr>
        <input type="text" id="batsmanName" placeholder="Batsman">
        <button onclick="updatePlayer('batsman')">Update</button>
        
        <hr>
        <input type="text" id="musicUrl" placeholder="Audio URL">
        <button onclick="playMusic(document.getElementById('musicUrl').value)">Play Music</button>
        <button onclick="stopMusic()">Stop</button>
        <input type="text" id="tickerText" placeholder="Breaking News">
        <button onclick="updateTicker(document.getElementById('tickerText').value)">Set News</button>
        
        <button onclick="toggleScoreboard()">Toggle Scoreboard</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
